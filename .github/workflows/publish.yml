name: Build and publish wheels to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write # Required for trusted publishing
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }} (cp${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # Build each Python version as its own parallel job instead of looping
        # all versions serially inside one runner. This is the biggest wall-clock
        # win, especially on the slower Windows/MSVC runners.
        python: ["311", "312", "313", "314"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install cibuildwheel
        run: python -m pip install "cibuildwheel>=2.21"
      - name: Cache cibuildwheel interpreters
        uses: actions/cache@v4
        with:
          path: ~/.cache/cibuildwheel
          key: cibuildwheel-${{ matrix.os }}-cp${{ matrix.python }}-${{ hashFiles('setup.py', 'pyproject.toml') }}
          restore-keys: cibuildwheel-${{ matrix.os }}-cp${{ matrix.python }}-
      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp${{ matrix.python }}-*"
          CIBW_CACHE_PATH: ~/.cache/cibuildwheel
          # uv builds the isolated build environment far faster than pip, which
          # is where most of the per-version build time is spent.
          CIBW_BUILD_FRONTEND: "build[uv]"
      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-cp${{ matrix.python }}
          path: wheelhouse/*.whl

  publish:
    name: Publish to PyPI
    needs: build_wheels
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Flatten wheels
        run: |
          mkdir -p final_dist
          find dist -name '*.whl' -exec cp {} final_dist/ \;
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages_dir: final_dist
